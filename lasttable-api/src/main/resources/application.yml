spring:
  application:
    name: lasttable-api

server:
  # 로컬 / Railway 모두 8080 고정.
  # Railway 네트워킹의 target port 도 8080 으로 맞춰야 함.
  port: 8080

kosis:
  base-url: https://kosis.kr
  # 데모용: 키를 yml에 박아둠. 환경변수는 신경 쓰지 않는다.
  # (실서비스라면 환경변수로 주입해야 함)
  api-key: OWUyNDE4YTRjNDU2ODY4N2IyZjEzMzQ3NTQ1YzBmNGE=
  timeout-ms: 10000

logging:
  level:
    com.lasttable.api: DEBUG
    org.springframework.web.reactive.function.client: INFO
