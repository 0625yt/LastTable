<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Last Table - KOSIS 뷰어</title>

  <!--
    CSS는 <style> 안에 한 번에 적었다.
    선택자(.클래스이름 또는 태그이름) 다음 { } 안에 꾸미는 규칙을 쓴다.
  -->
  <style>

    /* 페이지 전체 기본 */
    body {
      font-family: "Apple SD Gothic Neo", "맑은 고딕", sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background-color: #fafafa;
      color: #222;
    }

    h1 { margin-bottom: 4px; }

    p.sub {
      color: #777;
      margin-top: 0;
    }

    /* 탭 버튼 줄 */
    .tabs {
      display: flex;
      gap: 8px;
      margin: 20px 0 0;
      border-bottom: 2px solid #ddd;
    }

    .tab {
      padding: 10px 18px;
      font-size: 14px;
      background-color: transparent;
      color: #555;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
    }

    /* 활성화된 탭 */
    .tab.active {
      color: #2c7a7b;
      border-bottom: 2px solid #2c7a7b;
      font-weight: bold;
    }

    /* 입력 폼 박스 */
    .box {
      background-color: white;
      border: 1px solid #ddd;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    /* 숨겨진 박스 */
    .hidden {
      display: none;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    select, input {
      font-size: 14px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 220px;
    }

    button.go {
      margin-top: 16px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: bold;
      color: white;
      background-color: #2c7a7b;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button.go:hover {
      background-color: #285e61;
    }

    .meta {
      font-size: 13px;
      color: #555;
      margin: 8px 0;
    }

    .url {
      font-family: monospace;
      color: #2c7a7b;
      word-break: break-all;
    }

    pre {
      background-color: #1e1e1e;
      color: #e6e6e6;
      padding: 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
      max-height: 70vh;
      overflow: auto;
    }

    .error {
      color: #ff6b6b;
    }
  </style>
</head>
<body>

  <h1>Last Table · KOSIS 뷰어</h1>
  <p class="sub">통계청 KOSIS 공공 API 원본 JSON 뷰어</p>

  <!-- 탭 버튼 줄 -->
  <div class="tabs">
    <button class="tab active" id="tabFruit">과실 생산량</button>
    <button class="tab"        id="tabAqua">수산 양식 생산량</button>
  </div>


  <!-- ============================== -->
  <!-- 과실 탭 박스                    -->
  <!-- ============================== -->
  <div class="box" id="boxFruit">

    <label for="fruit">과일</label>
    <select id="fruit">
      <option value="apple">사과 (apple)</option>
      <option value="pear">배 (pear)</option>
      <option value="peach">복숭아 (peach)</option>
      <option value="grape">포도 (grape)</option>
      <option value="mandarin">감귤 (mandarin)</option>
      <option value="persimmon">감 (persimmon)</option>
      <option value="sweet-persimmon">단감 (sweet-persimmon)</option>
      <option value="astringent-persimmon">떫은감 (astringent-persimmon)</option>
      <option value="plum">자두 (plum)</option>
      <option value="japanese-apricot">매실 (japanese-apricot)</option>
    </select>

    <label for="fruitYears">최근 N년</label>
    <input id="fruitYears" type="number" min="1" max="20" value="3">

    <label for="fruitRegion">시도 필터 (선택)</label>
    <select id="fruitRegion">
      <option value="">전체 시도</option>
      <option value="계">전국 합계</option>
      <option value="서울특별시">서울특별시</option>
      <option value="부산광역시">부산광역시</option>
      <option value="대구광역시">대구광역시</option>
      <option value="인천광역시">인천광역시</option>
      <option value="광주광역시">광주광역시</option>
      <option value="대전광역시">대전광역시</option>
      <option value="울산광역시">울산광역시</option>
      <option value="세종특별자치시">세종특별자치시</option>
      <option value="경기도">경기도</option>
      <option value="강원도">강원도</option>
      <option value="충청북도">충청북도</option>
      <option value="충청남도">충청남도</option>
      <option value="전라북도">전라북도</option>
      <option value="전라남도">전라남도</option>
      <option value="경상북도">경상북도</option>
      <option value="경상남도">경상남도</option>
      <option value="제주도">제주도</option>
    </select>

    <br>
    <button class="go" id="fruitGoBtn">조회</button>
  </div>


  <!-- ============================== -->
  <!-- 수산 탭 박스 (처음에는 숨김)     -->
  <!-- ============================== -->
  <div class="box hidden" id="boxAqua">

    <label for="aquaYears">최근 N년</label>
    <input id="aquaYears" type="number" min="1" max="20" value="3">

    <label for="aquaRegion">시도 필터 (선택)</label>
    <select id="aquaRegion">
      <option value="">전체 시도</option>
      <option value="전국">전국 합계</option>
      <option value="부산광역시">부산광역시</option>
      <option value="울산광역시">울산광역시</option>
      <option value="강원도">강원도</option>
      <option value="충청남도">충청남도</option>
      <option value="전라북도">전라북도</option>
      <option value="전라남도">전라남도</option>
      <option value="경상북도">경상북도</option>
      <option value="경상남도">경상남도</option>
      <option value="제주도">제주도</option>
    </select>

    <br>
    <button class="go" id="aquaGoBtn">조회</button>
  </div>


  <!-- 결과 표시 영역 (탭과 무관하게 공용) -->
  <div class="meta">
    호출 URL: <span class="url" id="callUrl">-</span>
  </div>
  <div class="meta" id="summary">결과 대기 중…</div>

  <pre id="output">// 위에서 [조회] 버튼을 누르면 JSON이 여기에 표시됩니다.</pre>


  <!--
    여기부터 JavaScript.
  -->
  <script>

    // ─────────────────────────────────────────
    // 공용: URL 한 개를 호출해서 결과를 화면에 그린다.
    // ─────────────────────────────────────────
    function callApi(url) {
      document.getElementById("callUrl").textContent = url;
      document.getElementById("summary").textContent = "불러오는 중...";

      var output = document.getElementById("output");
      output.classList.remove("error");
      output.textContent = "// loading...";

      fetch(url)
        .then(function (response) {
          if (response.ok === false) {
            throw new Error("HTTP " + response.status);
          }
          return response.json();
        })
        .then(function (data) {
          output.textContent = JSON.stringify(data, null, 2);
          document.getElementById("summary").textContent =
            "결과 " + data.length + " 행";
        })
        .catch(function (error) {
          output.classList.add("error");
          output.textContent = "// 에러 발생\n" + error.message;
          document.getElementById("summary").textContent = "조회 실패";
        });
    }

    // ─────────────────────────────────────────
    // 과실 탭의 [조회] 버튼이 눌렸을 때
    // ─────────────────────────────────────────
    function fetchFruit() {
      var fruit  = document.getElementById("fruit").value;
      var years  = document.getElementById("fruitYears").value;
      var region = document.getElementById("fruitRegion").value;

      var url = "/api/kosis/fruits/" + encodeURIComponent(fruit) + "/production";
      url = url + "?years=" + encodeURIComponent(years);
      if (region !== "") {
        url = url + "&region=" + encodeURIComponent(region);
      }
      callApi(url);
    }

    // ─────────────────────────────────────────
    // 수산 탭의 [조회] 버튼이 눌렸을 때
    // ─────────────────────────────────────────
    function fetchAqua() {
      var years  = document.getElementById("aquaYears").value;
      var region = document.getElementById("aquaRegion").value;

      var url = "/api/kosis/aquaculture/production";
      url = url + "?years=" + encodeURIComponent(years);
      if (region !== "") {
        url = url + "&region=" + encodeURIComponent(region);
      }
      callApi(url);
    }

    // 버튼-함수 연결
    document.getElementById("fruitGoBtn").onclick = fetchFruit;
    document.getElementById("aquaGoBtn").onclick  = fetchAqua;


    // ─────────────────────────────────────────
    // 탭 전환
    // ─────────────────────────────────────────
    function showTab(name) {
      var tabFruit  = document.getElementById("tabFruit");
      var tabAqua   = document.getElementById("tabAqua");
      var boxFruit  = document.getElementById("boxFruit");
      var boxAqua   = document.getElementById("boxAqua");

      if (name === "fruit") {
        tabFruit.classList.add("active");
        tabAqua.classList.remove("active");
        boxFruit.classList.remove("hidden");
        boxAqua.classList.add("hidden");
      } else {
        tabAqua.classList.add("active");
        tabFruit.classList.remove("active");
        boxAqua.classList.remove("hidden");
        boxFruit.classList.add("hidden");
      }
    }

    document.getElementById("tabFruit").onclick = function () { showTab("fruit"); };
    document.getElementById("tabAqua").onclick  = function () { showTab("aqua"); };


    // 페이지 열릴 때: 과실 탭 자동 조회
    fetchFruit();

  </script>

</body>
</html>
